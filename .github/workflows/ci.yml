name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build-test-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      # Scoped to the unit test project: a solution-wide `dotnet test` would
      # also pick up BrowserTests (now registered in the .slnx for local
      # discoverability), whose Playwright browser binaries aren't installed
      # until the dedicated steps below.
      - name: Test
        run: dotnet test tests/TerraFluent.Html.Reporting.Tests/TerraFluent.Html.Reporting.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Restore browser tests
        run: dotnet restore tests/TerraFluent.Html.Reporting.BrowserTests/TerraFluent.Html.Reporting.BrowserTests.csproj

      - name: Build browser tests
        run: dotnet build tests/TerraFluent.Html.Reporting.BrowserTests/TerraFluent.Html.Reporting.BrowserTests.csproj --configuration Release --no-restore

      - name: Install browser engines
        run: pwsh tests/TerraFluent.Html.Reporting.BrowserTests/bin/Release/net10.0/playwright.ps1 install --with-deps chromium firefox webkit

      - name: Test print layout in Chromium, Firefox, and WebKit
        run: dotnet test tests/TerraFluent.Html.Reporting.BrowserTests/TerraFluent.Html.Reporting.BrowserTests.csproj --configuration Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack src/TerraFluent.Html.Reporting/TerraFluent.Html.Reporting.csproj --configuration Release --no-build --output artifacts

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*.*nupkg

  # Publishes to NuGet.org. Only runs for a pushed tag like "v0.1.0-alpha" -
  # merging to master never publishes by itself, so a release is always a
  # deliberate, separate action (push a tag) rather than a side effect of CI.
  publish:
    needs: build-test-pack
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts

      # Guards against publishing under the wrong version because <Version>
      # in Directory.Build.props was left stale when the tag was cut.
      - name: Verify tag matches package version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_file=$(find artifacts -maxdepth 1 -name '*.nupkg' ! -name '*.snupkg' | head -n1)
          package_version=$(basename "$package_file" .nupkg | sed -E 's/^TerraFluent\.Html\.Reporting\.//')
          if [ "$tag_version" != "$package_version" ]; then
            echo "Tag v$tag_version does not match package version $package_version. Update <Version> in Directory.Build.props and re-tag." >&2
            exit 1
          fi

      - name: NuGet login
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
